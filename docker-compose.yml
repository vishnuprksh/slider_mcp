services:
  slider-mcp:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_FORMAT=console
      - LOG_LEVEL=DEBUG
      - DEBUG=true
    volumes:
      - ./:/app  # hot-reload in dev; remove for prod image
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
